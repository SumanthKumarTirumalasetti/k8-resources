kind: Service
apiVersion: v1
metadata:
  name: nginx
spec:
  data:
  labels:
    project: expense
    component: backend
    environment: dev
  ports:
    sourceport: 80
    targetport: 80

---

kind: Pod
apiVersion: v1
metadata:
  name: backend
  labels:
    project: expense
    component: backend
    environment: dev
spec:
  containers:
  - name: nginx
    image: nginx
